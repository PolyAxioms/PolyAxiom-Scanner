name: PolyAxiom Auto Scanner

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 关键：赋予脚本推送代码的权限
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scanner
        run: python scanner.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "PolyAxiom-Bot"
          git config --global user.email "bot@polyaxiom.com"
          git add data.json
          git commit -m "自动更新实时信号数据" || exit 0
          git push
