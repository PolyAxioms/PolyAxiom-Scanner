<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom | 全球预测市场监控终端</title>
    <style>
        :root {
            --bg: #040508; --card-bg: rgba(13, 17, 23, 0.8); --accent: #238636;
            --text: #8b949e; --text-white: #f0f6fc; --border: #30363d;
            --blue: #388bfd; --orange: #d29922; --red: #f85149; --neon: #00f2ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 1. 暗黑霓虹网格背景 */
        body { 
            background: var(--bg); 
            background-image: 
                linear-gradient(rgba(56, 139, 253, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 139, 253, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace, -apple-system; 
            overflow-x: hidden; 
        }

        .app-wrapper { max-width: 1440px; margin: 0 auto; padding: 20px; position: relative; }

        /* 顶部 Header */
        header { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { 
            color: #fff; font-size: 42px; font-weight: 900; letter-spacing: -2px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); 
        }
        .contact-bar { margin: 15px 0; display: flex; justify-content: center; gap: 15px; }
        .contact-link { 
            color: var(--neon); text-decoration: none; font-size: 13px; border: 1px solid var(--neon); 
            padding: 8px 18px; border-radius: 4px; transition: 0.3s; background: rgba(0, 242, 255, 0.05); 
        }
        .contact-link:hover { box-shadow: 0 0 15px var(--neon); background: var(--neon); color: #000; }

        .layout-grid { display: flex; gap: 20px; }

        /* 左侧：日历 + Feed */
        .sidebar-left { width: 280px; flex-shrink: 0; }
        .side-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .event-item { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #21262d; }
        .event-date { color: var(--orange); font-weight: bold; }

        /* 中间：主图 + 18卡片 */
        .main-content { flex-grow: 1; min-width: 0; }
        .hero-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .hero-box { border: 1px solid var(--border); border-radius: 12px; height: 300px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .signals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .market-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; position: relative; transition: 0.3s; }
        .market-card:hover { border-color: var(--neon); transform: scale(1.02); z-index: 10; }
        
        /* 2. 套利监测标签 */
        .arb-tag { position: absolute; top: 10px; right: 10px; font-size: 10px; color: var(--red); background: rgba(248, 81, 73, 0.1); border: 1px solid var(--red); padding: 1px 4px; border-radius: 2px; animation: flash 2s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .tag { position: absolute; top: 10px; left: 10px; font-size: 9px; padding: 2px 6px; border-radius: 2px; color: #fff; }
        .card-title { color: #fff; font-size: 14px; font-weight: bold; margin: 25px 0 15px; min-height: 40px; }
        .prob-display { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .prob-val { font-size: 32px; font-weight: 900; color: var(--neon); }

        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; text-align: center; padding: 10px; border-radius: 4px; font-size: 11px; font-weight: bold; text-decoration: none; transition: 0.2s; cursor: pointer; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-outline { border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { color: var(--neon); border-color: var(--neon); }

        /* 右侧：计算器 + 汇率 */
        .sidebar-right { width: 280px; flex-shrink: 0; }
        .calc-input { width: 100%; background: #0d1117; border: 1px solid var(--border); color: #fff; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-family: monospace; }

        @media (max-width: 1200px) {
            .layout-grid { flex-direction: column; }
            .sidebar-left, .sidebar-right, .signals-grid { width: 100%; grid-template-columns: repeat(2, 1fr); }
            .hero-section { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) { .signals-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="logo-area"><h1>PolyAxiom TERMINAL</h1></div>
        <div class="contact-bar">
            <a href="https://x.com/Poly_Axiom" target="_blank" class="contact-link">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" target="_blank" class="contact-link">✈️ TG 信号频道</a>
        </div>
    </header>

    <div class="layout-grid">
        <aside class="sidebar-left">
            <div class="side-box">
                <div style="color:var(--orange); font-size:12px; font-weight:bold; margin-bottom:15px;">📅 2026 经济日历</div>
                <div id="calendar">
                    <div class="event-item"><span>美联储议息会议</span><span class="event-date">05/14</span></div>
                    <div class="event-item"><span>世界杯开幕仪式</span><span class="event-date">06/11</span></div>
                    <div class="event-item"><span>美国中期选举</span><span class="event-date">11/03</span></div>
                </div>
            </div>
            <div class="side-box" style="height: 600px; overflow: hidden;">
                <div style="color:var(--neon); font-size:12px; font-weight:bold; margin-bottom:15px;">📡 实时流监测</div>
                <div id="feed-list" style="font-size: 10px; line-height: 1.8;"></div>
            </div>
        </aside>

        <main class="main-content">
            <section class="hero-section">
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&theme=dark&r=PolyAxiom"></iframe></div>
                <div class="hero-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark&r=PolyAxiom"></iframe></div>
            </section>
            
            <div class="signals-grid" id="market-grid">
                </div>
        </main>

        <aside class="sidebar-right">
            <div class="side-box">
                <div style="color:#fff; font-size:13px; font-weight:bold; margin-bottom:15px;">💱 汇率/对冲</div>
                <div style="font-size: 11px; margin-bottom: 5px;">USDT 金额</div>
                <input type="number" id="usdt-val" class="calc-input" value="1000">
                <div style="text-align: center; margin-bottom: 10px;">≈ <span id="cny-val" style="color:var(--orange); font-weight:bold;">¥ 7240.00</span></div>
                <a href="https://polymarket.com/?r=PolyAxiom" target="_blank" class="btn btn-blue" style="display:block;">一键执行套利下单</a>
            </div>
            <div class="side-box" style="text-align:center;">
                <div style="color:var(--neon); font-size:11px; margin-bottom:10px;">AI 信号订阅</div>
                <p style="font-size:10px; margin-bottom:15px;">当波动率 > 5% 时自动提醒</p>
                <a href="https://t.me/PolyAxiom_ZH" target="_blank" class="btn btn-outline" style="display:block;">加入推送频道</a>
            </div>
        </aside>
    </div>
</div>

<script>
    const INVITE = "?r=PolyAxiom";
    const markets = [
        { t: 'macro', title: '美联储2026年6月前降息吗？', prob: '72.0', c: '#8957e5' },
        { t: 'tech', title: 'Nvidia 市值突破 5 万亿美元吗？', prob: '54.2', c: '#388bfd' },
        { t: 'sports', title: '2026 世界杯：西班牙夺冠？', prob: '16.0', c: '#d29922' },
        { t: 'fun', title: 'GTA VI 会跳票到 2027 年吗？', prob: '12.5', c: '#da36a8' },
        { t: 'tech', title: 'SpaceX 2026完成轨道加油测试？', prob: '88.1', c: '#388bfd' },
        { t: 'macro', title: '比特币触及 $100,000 价格位？', prob: '68.2', c: '#3fb950' },
        { t: 'sports', title: 'NBA 2026 总冠军：凯尔特人？', prob: '38.5', c: '#d29922' },
        { t: 'tech', title: 'Apple 发布首款 AR 智能眼镜？', prob: '21.0', c: '#388bfd' },
        { t: 'macro', title: '黄金价格突破 $3000？', prob: '42.0', c: '#8957e5' },
        { t: 'macro', title: '以太坊市值超越比特币？', prob: '9.5', c: '#3fb950' },
        { t: 'tech', title: 'AI 智能体实现 AGI 意识？', prob: '18.2', c: '#388bfd' },
        { t: 'macro', title: '2026 美国中期选举共和党赢？', prob: '51.5', c: '#8957e5' },
        { t: 'fun', title: '泰勒·斯威夫特宣布2026巡演？', prob: '85.0', c: '#da36a8' },
        { t: 'sports', title: '梅西参加 2026 年世界杯？', prob: '45.0', c: '#d29922' },
        { t: 'tech', title: '特斯拉 Cybercab 批量下线？', prob: '33.5', c: '#388bfd' },
        { t: 'macro', title: '原油价格跌破 $60 每桶？', prob: '28.0', c: '#8957e5' },
        { t: 'fun', title: '奥斯卡 2026：最佳影片预测？', prob: '14.0', c: '#da36a8' },
        { t: 'sports', title: 'F1 2026：法拉利车队夺冠？', prob: '62.0', c: '#d29922' }
    ];

    // 渲染 18 个卡片
    document.getElementById('market-grid').innerHTML = markets.map(m => {
        const arb = (Math.random() * 4).toFixed(1); // 随机生成模拟价差
        return `
            <div class="market-card">
                <span class="tag" style="background:${m.c}">${m.t.toUpperCase()}</span>
                ${arb > 2 ? `<div class="arb-tag">Arb: ${arb}% 价差</div>` : ''}
                <div class="card-title">${m.title}</div>
                <div class="prob-display">
                    <div class="prob-val">${m.prob}%</div>
                </div>
                <div class="btn-row">
                    <a href="https://polymarket.com/${INVITE}" target="_blank" class="btn btn-blue">立即下单</a>
                    <a href="https://t.me/PolyAxiom_ZH" target="_blank" class="btn btn-outline">AI 报告</a>
                </div>
            </div>
        `;
    }).join('');

    // 汇率计算
    const usdt = document.getElementById('usdt-val');
    const cny = document.getElementById('cny-val');
    usdt.oninput = () => { cny.innerText = '¥ ' + (usdt.value * 7.24).toFixed(2); };

    // Feed 流
    const feed = document.getElementById('feed-list');
    function addFeed() {
        const div = document.createElement('div');
        div.style.marginBottom = "10px";
        div.innerHTML = `<span style="color:#484f58;">${new Date().toLocaleTimeString()}</span> 
                         <span style="color:var(--neon);">鲸鱼 0x${Math.random().toString(16).slice(2,6)}</span> 
                         买入 <b style="color:#fff;">$${(Math.random()*20+5).toFixed(1)}k</b>`;
        feed.prepend(div);
        if(feed.children.length > 25) feed.lastElementChild.remove();
    }
    setInterval(addFeed, 2500); addFeed();
</script>

</body>
</html>
