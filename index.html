<script>
    async function loadSignals() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            const data = await response.json();
            const list = document.getElementById('signals-list');
            
            list.innerHTML = data.map(item => `
                <div class="card">
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <span class="category">${item.category}</span>
                            <span style="font-size: 10px; color: #3fb950; display: flex; align-items: center;">
                                <span style="width: 6px; height: 6px; background: #3fb950; border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite;"></span>
                                24h Vol: $${item.volume}k
                            </span>
                        </div>
                        <div class="title">${item.title}</div>
                        <div class="stats">
                            <div class="odds-label">实时胜率</div>
                            <div class="odds-value">${item.odds}%</div>
                        </div>
                    </div>
                    <a href="${item.link}" class="btn" target="_blank">立即前往下单</a>
                </div>
            `).join('');

            // 更新 SEO 描述
            const topTitles = data.slice(0, 3).map(item => item.title).join(', ');
            document.getElementById('meta-description').content = `PolyAxiom 正在监控：${topTitles}... 获取 Polymarket 最新暴涨信号。`;
            
        } catch (e) {
            console.error(e);
        }
    }
    // 增加一个简单的脉冲动画 CSS
    const style = document.createElement('style');
    style.innerHTML = "@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }";
    document.head.appendChild(style);
    
    loadSignals();
    setInterval(loadSignals, 60000);
</script>
