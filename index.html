<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom - 实时高胜率信号监控</title>
    <style>
        :root {
            --bg: #0a0e17;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #adbac7;
            --text-bright: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-container img {
            max-width: 260px;
            height: auto;
            /* 给白色 Logo 增加一层淡淡的蓝色科幻光晕 */
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.3));
            margin-bottom: 15px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .category {
            font-size: 12px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .stats {
            background: rgba(88, 166, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .odds-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }

        .btn {
            background: #238636;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: #2ea043; }

        footer {
            margin-top: 60px;
            font-size: 14px;
            color: #768390;
        }

        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="PolyAxiom">
    </div>
    <p>Polymarket 实时高胜率信号监控</p>
</header>

<div class="container" id="signals-list">
    </div>

<footer>
    © 2026 PolyAxiom | <a href="https://t.me/XXYY_CC" target="_blank">联系我们 (Telegram)</a>
</footer>

<script>
    async function loadSignals() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            const list = document.getElementById('signals-list');
            
            list.innerHTML = data.map(item => `
                <div class="card">
                    <div>
                        <div class="category">${item.category}</div>
                        <div class="title">${item.title}</div>
                        <div class="stats">
                            <div style="font-size: 12px; margin-bottom: 4px;">当前胜率</div>
                            <div class="odds-value">${item.odds}%</div>
                        </div>
                    </div>
                    <a href="${item.link}" class="btn" target="_blank">立即前往下单</a>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('signals-list').innerHTML = '<p style="text-align:center; grid-column: 1/-1;">数据加载中，请稍后刷新...</p>';
        }
    }
    loadSignals();
    // 每 5 分钟自动检测一次新数据
    setInterval(loadSignals, 300000);
</script>

</body>
</html>
