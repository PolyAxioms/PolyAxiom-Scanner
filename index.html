<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom | 预测市场 Alpha 导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(51, 65, 85, 0.5); 
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-card:hover { 
            border-color: #38bdf8; 
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        #google_translate_element { margin-left: 10px; }
        .goog-te-gadget-simple {
            background-color: #1e293b !important;
            border: 1px solid #334155 !important;
            padding: 4px 8px !important;
            border-radius: 8px !important;
            color: #fff !important;
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-black">

    <nav class="max-w-6xl mx-auto p-6 flex justify-between items-center border-b border-slate-800/50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center font-bold text-black">P</div>
            <span class="text-xl font-black tracking-tighter uppercase tracking-widest">PolyAxiom</span>
        </div>
        <div class="flex items-center">
            <div id="google_translate_element"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div id="signals-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center md:text-left">
            <div class="text-slate-500 col-span-full py-20 text-center">
                <div class="inline-block animate-spin mb-4">⌛</div>
                <p>正在同步全球预测市场信号...</p>
            </div>
        </div>
    </main>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'zh-CN', 
                includedLanguages: 'en,zh-TW,ja,ko,es,vi', 
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // 注意：网页端必须使用 Anon Key，严禁使用 Service Role Key
        const SUPABASE_URL = 'https://mqitovjowfayunujvpgn.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_JvLqRPVcS7xpHT-TNatAtQ_xRr6JhkD'; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchSignals() {
            const container = document.getElementById('signals-container');
            
            try {
                // 1. 尝试从数据库读取
                const { data, error } = await _supabase
                    .from('alpha_signals')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // 2. 渲染数据
                if (!data || data.length === 0) {
                    container.innerHTML = `<div class="text-slate-500 col-span-full py-20 text-center">暂无活跃信号，AI 正在扫描中...</div>`;
                    return;
                }

                container.innerHTML = data.map(item => `
                    <div class="p-6 rounded-2xl glass-card flex flex-col h-full text-left">
                        <div class="flex-grow">
                            <span class="inline-block px-2 py-1 rounded-md bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase mb-4 tracking-wider font-mono">Signal Live</span>
                            <h2 class="text-lg font-bold leading-tight mb-4 text-slate-100 notranslate">${item.title}</h2>
                            <div class="text-slate-400 text-sm leading-relaxed mb-8 border-l-2 border-slate-700 pl-4 py-1 italic">
                                ${item.ai_summary || 'AI 正在深度分析逻辑...'}
                            </div>
                        </div>
                        <a href="${item.referral_link}" target="_blank" class="w-full py-3 px-4 bg-sky-600 hover:bg-sky-500 text-white text-sm font-bold rounded-xl transition-all text-center shadow-lg shadow-sky-900/20 active:scale-95">
                            立即参与预测 (GET REWARD)
                        </a>
                    </div>
                `).join('');

            } catch (err) {
                console.error('连接失败详情:', err);
                // 3. 增强型错误提示（针对网络环境问题）
                container.innerHTML = `
                    <div class="text-red-400 text-sm col-span-full py-20 text-center glass-card mx-6 rounded-2xl">
                        <p class="text-xl mb-4">⚠️ 信号同步中断</p>
                        <p class="mb-2 text-slate-400">错误信息: ${err.message || '网络无法解析数据库地址'}</p>
                        <div class="mt-6 p-4 bg-slate-900/50 rounded-lg inline-block text-left text-xs text-slate-500">
                            <strong>排查建议：</strong><br>
                            1. 检查是否开启了全局加速代理（VPN）<br>
                            2. 尝试切换手机移动流量访问<br>
                            3. 检查 DNS 是否为 8.8.8.8
                        </div>
                        <br>
                        <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-sky-600 text-white rounded-lg font-bold">重试连接</button>
                    </div>`;
            }
        }

        fetchSignals();
    </script>
</body>
</html>
