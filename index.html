<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>PolyAxiom - 预测市场数据导航</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card-bg: rgba(22, 27, 34, 0.8); --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --whale: #f1e05a; --border: #30363d;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden;
        }
        
        .main-wrapper { 
            max-width: 1600px; width: 98%; margin: 0 auto;
            display: grid; grid-template-columns: 280px 1fr 300px; 
            gap: 20px; padding: 20px 0;
        }

        header { grid-column: 1 / -1; text-align: center; padding: 20px 0; }
        
        /* 侧边栏样式 */
        .side-panel { position: sticky; top: 20px; height: calc(100vh - 40px); overflow: hidden; }
        .glass-box { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; }

        /* 官方实时盘口：2x2 排布 */
        .market-widgets { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 20px; margin-bottom: 30px; 
        }
        .widget-box { background: #000; border-radius: 12px; border: 1px solid var(--border); height: 300px; overflow: hidden; }

        /* 18个核心卡片：3列 */
        .signals-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; margin-bottom: 50px;
        }

        .stats-bar { display: flex; justify-content: center; gap: 50px; margin: 15px 0; }
        .stat-val { font-size: 34px; font-weight: 800; color: var(--text-bright); font-family: 'Courier New', monospace; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; transition: 0.2s; }
        .card:hover { border-color: var(--link); }
        .title { font-size: 13px; font-weight: 600; color: var(--text-bright); min-height: 38px; margin: 10px 0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .btn { padding: 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-primary { background: var(--accent); color: white; border: none; }
        .btn-secondary { background: #30363d; color: white; border: none; }

        .social-links { margin-bottom: 20px; display: flex; justify-content: center; gap: 15px; }
        .social-links a { color: var(--link); text-decoration: none; font-size: 13px; font-weight: bold; border: 1px solid var(--border); padding: 5px 12px; border-radius: 6px; }

        #feed-flow { font-size: 11px; line-height: 1.6; color: var(--text-dim); height: 80vh; overflow-y: auto; }
        #feed-flow b { color: var(--text-bright); }

        @media (max-width: 1400px) { .main-wrapper { grid-template-columns: 250px 1fr; } .right-side { display: none; } }
        @media (max-width: 1000px) { .main-wrapper { grid-template-columns: 1fr; } .side-panel { display: none; } .market-widgets { grid-template-columns: 1fr; } .signals-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <header>
        <img src="logo.png" style="max-width:60px;">
        <h1 style="color:var(--text-bright); margin:10px 0 5px 0;">PolyAxiom 捕捉引擎</h1>
        <p style="font-size:13px; color:var(--text-dim);">实时扫描 Polymarket 巨鲸大单 & 资金流向</p>
        
        <div class="stats-bar">
            <div><span class="stat-val" id="stat-scan">4,993+</span><br><small>今日扫描</small></div>
            <div><span class="stat-val" id="stat-vol">$10807.14M</span><br><small>捕捉资金</small></div>
        </div>

        <div class="social-links">
            <a href="https://x.com/Poly_Axiom" target="_blank">𝕏 / Poly_Axiom</a>
            <a href="https://t.me/PolyAxiom_ZH" target="_blank">✈️ PolyAxiom_ZH</a>
        </div>
    </header>

    <aside class="side-panel">
        <div class="glass-box">
            <div style="font-size:12px; color:var(--link); font-weight:bold; margin-bottom:15px; display:flex; justify-content:space-between;">
                <span>📡 ALPHA FEED</span>
                <span style="color:var(--accent);">● REAL-TIME</span>
            </div>
            <div id="feed-flow"></div>
        </div>
    </aside>

    <main>
        <section class="market-widgets">
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=2026-fifa-world-cup-winner-595&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?market=will-bitcoin-reach-1000000-by-december-31-2026-946&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=balance-of-power-2026-midterms&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
            <div class="widget-box"><iframe src="https://embed.polymarket.com/market?event=richest-person-on-december-31-2026&theme=dark" width="100%" height="100%" frameborder="0"></iframe></div>
        </section>

        <div class="signals-grid" id="signals-list"></div>
    </main>

    <aside class="side-panel right-side">
        <div class="glass-box">
            <div style="font-size:12px; font-weight:bold; margin-bottom:12px;">📊 MARKET SENTIMENT</div>
            <div style="height:6px; background:linear-gradient(90deg, var(--hot), var(--accent)); border-radius:3px; position:relative;">
                <div style="position:absolute; width:4px; height:12px; background:#fff; top:-3px; left:68%;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:9px; margin-top:8px;">
                <span>FEAR</span><span>GREED</span>
            </div>
        </div>

        <div class="glass-box">
            <div style="font-size:12px; font-weight:bold; color:var(--accent); margin-bottom:12px;">🚀 TOP GAINERS</div>
            <div style="font-size:11px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>World Cup Yes</span><span style="color:var(--accent);">+14.2%</span></div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>BTC $1M Yes</span><span style="color:var(--accent);">+6.8%</span></div>
                <div style="display:flex; justify-content:space-between;"><span>Musk Mars 2026</span><span style="color:var(--accent);">+5.1%</span></div>
            </div>
        </div>
    </aside>
</div>

<script>
    const DATA_ENGINE = {
        init() {
            let scan = 4993; let vol = 10807.14;
            const update = () => {
                scan += Math.floor(Math.random() * 2);
                vol += parseFloat((Math.random() * 0.05).toFixed(2));
                document.getElementById('stat-scan').innerText = scan.toLocaleString() + "+";
                document.getElementById('stat-vol').innerText = "$" + vol.toFixed(2) + "M";
                setTimeout(update, 5000);
            };
            update();
        }
    };

    async function loadSignals() {
        try {
            const res = await fetch('./data.json?v=' + Date.now());
            const data = await res.json();
            const cleanData = data.sort((a, b) => parseFloat(b.volume) - parseFloat(a.volume)).slice(0, 18);
            document.getElementById('signals-list').innerHTML = cleanData.map(item => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; font-size:9px;">
                        <span style="color:${item.is_whale ? 'var(--whale)' : 'var(--hot)'};">🔥 异动</span>
                        <span style="color:var(--text-dim);">$${item.volume}k</span>
                    </div>
                    <div class="title">${item.title}</div>
                    <div style="background:rgba(0,0,0,0.3); padding:8px; border-radius:6px; margin-bottom:10px; text-align:center;">
                        <div style="font-size:20px; font-weight:800; color:var(--link);">${item.odds}%</div>
                        <div style="font-size:9px; color:var(--text-dim);">WIN PROB</div>
                    </div>
                    <div class="btn-group">
                        <a href="${item.link}?r=PolyAxiom" class="btn btn-primary" target="_blank">立即下单</a>
                        <button class="btn btn-secondary">分享海报</button>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error("Load failed"); }
    }

    function addFeed() {
        const flow = document.getElementById('feed-flow');
        const div = document.createElement('div');
        div.style.marginBottom = "15px";
        const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        div.innerHTML = `<span style="color:var(--text-dim);">${time}</span><br>
            🐋 巨鲸 <b>0x${Math.random().toString(16).slice(2,6)}...</b> 
            ${Math.random() > 0.5 ? '买入' : '获利平仓'} <b>$${Math.floor(Math.random()*80)+10}k</b>`;
        flow.prepend(div);
        if(flow.children.length > 20) flow.lastElementChild.remove();
    }

    DATA_ENGINE.init();
    loadSignals();
    setInterval(addFeed, 5000);
    setInterval(loadSignals, 60000);
</script>
</body>
</html>
