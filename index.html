<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyAxiom - 实时高胜率信号监控</title>
    <style>
        :root {
            --bg: #0d1117; --card-bg: #161b22; --accent: #238636;
            --text: #adbac7; --text-bright: #ffffff; --text-dim: #768390; --link: #58a6ff;
            --hot: #f85149; --gold: #d4af37; --gold-bg: rgba(212, 175, 55, 0.05);
        }
        body {
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        header { text-align: center; margin-bottom: 30px; }
        .logo-container img { max-width: 110px; height: auto; filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.3)); }
        
        .container {
            max-width: 1200px; width: 100%;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px;
        }

        /* 基础卡片样式 */
        .card {
            background: var(--card-bg); border: 1px solid #30363d; border-radius: 12px;
            padding: 20px; display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }

        /* 90%胜率尊贵暗金效果 */
        .card-gold {
            background: linear-gradient(145deg, #1c2128, #161b22);
            border: 1px solid var(--gold) !important;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.05);
        }
        .card-gold .odds-value { color: var(--gold) !important; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        .title { font-size: 15px; font-weight: 600; color: var(--text-bright); min-height: 40px; line-height: 1.4; margin-bottom: 12px; }
        .stats-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        .odds-value { font-size: 24px; font-weight: 800; color: var(--link); }
        
        .btn { 
            background: var(--accent); color: white; text-align: center; padding: 12px; 
            border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        /* 动画 */
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .hot-label { animation: blink 1.5s infinite; color: var(--hot) !important; font-weight: 800; }

        footer { margin-top: 60px; padding: 40px 20px; text-align: center; border-top: 1px solid #30363d; width: 100%; font-size: 13px; color: var(--text-dim); }
        .footer-links { margin-top: 15px; }
        .footer-links a { color: var(--link); text-decoration: none; margin: 0 12px; transition: color 0.2s; }
        .footer-links a:hover { color: var(--text-bright); }
    </style>
</head>
<body>

<header>
    <div class="logo-container"><img src="logo.png" alt="PolyAxiom"></div>
    <p style="font-size: 14px; opacity: 0.8; margin-top: 10px;">Polymarket 实时高胜率信号监控</p>
</header>

<div class="container" id="signals-list">
    <p style="grid-column: 1/-1; text-align:center;">正在接入实时预测流...</p>
</div>

<footer>
    <div>© 2026 PolyAxiom | 预测市场异动引擎</div>
    <div class="footer-links">
        <a href="https://t.me/PolyAxiom_ZH" target="_blank">✈️ Telegram 频道</a>
        <a href="https://x.com/Poly_Axiom" target="_blank">𝕏 官方推特</a>
    </div>
</footer>

<script>
    async function loadSignals() {
        try {
            const response = await fetch('data.json?v=' + Date.now());
            const data = await response.json();
            const list = document.getElementById('signals-list');
            
            list.innerHTML = data.map(item => {
                const isGold = item.odds >= 90;
                return `
                <div class="card ${isGold ? 'card-gold' : ''}" style="${item.is_hot ? 'border-color: var(--hot);' : ''}">
                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <span class="${item.is_hot ? 'hot-label' : ''}" style="font-size: 11px; color: var(--link);">
                                ${item.is_hot ? '🔥 异动暴涨' : (item.category || '预测市场')}
                            </span>
                            <span style="font-size: 10px; color: #3fb950; background: rgba(63, 185, 80, 0.1); padding: 2px 6px; border-radius: 4px;">
                                Vol: $${item.volume}k
                            </span>
                        </div>
                        <div class="title">${item.title}</div>
                        <div class="stats-box">
                            <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 4px;">当前胜率</div>
                            <div class="odds-value">${item.odds}% ${item.is_hot ? '↑' : ''}</div>
                        </div>
                    </div>
                    <a href="${item.link}" class="btn" target="_blank" style="${isGold ? 'background: #9a7d28;' : (item.is_hot ? 'background: var(--hot);' : '')}">立即前往下单</a>
                </div>
            `}).join('');
        } catch (e) { console.error(e); }
    }
    loadSignals();
    setInterval(loadSignals, 60000);
</script>
</body>
</html>
